name: test-and-deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: pytest -q

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble static site
        run: |
          mkdir -p site
          cp web/index.html site/index.html
          # the archive must expose `app/` and `medigap_engine/` at its root so
          # the in-browser Python can import them directly.
          mkdir -p bundle
          cp -r app bundle/app
          cp -r src/medigap_engine bundle/medigap_engine
          tar -C bundle -czf site/app.tar.gz app medigap_engine
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
